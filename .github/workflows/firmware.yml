name: Build ESP32 firmware

# Builds the button/LED tester firmware and commits the merged binary back to
# the repo. The cabinet flashes that committed binary on load — it never
# builds firmware itself. See docs/esp32-firmware in the Fliphetic docs.

on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - "!firmware/build/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO and esptool
        run: pip install platformio esptool

      - name: Build
        # WIFI_PASS is injected as a build flag from the repo secret so the
        # FLIPHETIC_CAB0 passphrase never lands in the source. (It is still
        # embedded in the committed binary, so keep that AP passphrase
        # dedicated — never reuse the cab's SSH/account password for it.)
        env:
          PLATFORMIO_BUILD_FLAGS: -DWIFI_PASS='"${{ secrets.WIFI_PASS }}"'
        run: pio run --project-dir firmware

      - name: Merge into a single image
        run: |
          BUILD=firmware/.pio/build/esp32dev
          mkdir -p firmware/build
          esptool --chip esp32 merge_bin -o firmware/build/firmware.bin \
            0x1000  "$BUILD/bootloader.bin" \
            0x8000  "$BUILD/partitions.bin" \
            0x10000 "$BUILD/firmware.bin"

      - name: Commit the binary
        run: |
          git config user.name  "firmware-ci"
          git config user.email "firmware-ci@users.noreply.github.com"
          git add firmware/build/firmware.bin
          git diff --staged --quiet && echo "no change" && exit 0
          git commit -m "ci: rebuild ESP32 firmware [skip ci]"
          git push
