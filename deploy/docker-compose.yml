# One nginx service backs all three screens. The fliphetic.toml [screens]
# block points each screen at /?screen=<role> — the page reads that param.
services:
  debug:
    image: nginx:alpine
    volumes:
      - ../site:/usr/share/nginx/html:ro
    ports: ["0:80"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 5s
      timeout: 2s
      retries: 5
