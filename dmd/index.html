<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TEST #2 · DMD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #ffae00;
                 font-family: 'Press Start 2P', "Courier New", monospace; overflow: hidden;
                 text-shadow: 0 0 1.5vh #ff8c00, 0 0 3vh #ff8c00aa, 0 0 6vh #ff570055; }

    /* Stack three rows: logo, big scroll, small subtitle scroll. */
    .stage { display: grid; grid-template-rows: 1fr auto 1fr; height: 100%; align-items: center; }

    /* Logo row — boot.png as a dot-matrixy emblem in the middle, animated colors. */
    .logo {
      display: grid; place-content: center; height: 100%;
      filter: drop-shadow(0 0 3vh #ff8c00cc);
    }
    .logo img {
      width: 25vh; height: 25vh; object-fit: contain;
      /* Force orange tinting so it fits the DMD aesthetic, animated. */
      filter: brightness(0) saturate(100%) invert(56%) sepia(74%) saturate(2030%) hue-rotate(360deg) brightness(102%) contrast(101%);
      animation: hueCycle 6s linear infinite, bob 3s ease-in-out infinite;
    }
    @keyframes hueCycle {
      0%, 100% { filter: brightness(0) saturate(100%) invert(56%) sepia(74%) saturate(2030%) hue-rotate(0deg)   brightness(102%) contrast(101%); }
      50%      { filter: brightness(0) saturate(100%) invert(56%) sepia(74%) saturate(2030%) hue-rotate(310deg) brightness(102%) contrast(101%); }
    }
    @keyframes bob {
      0%, 100% { transform: translateY(-1vh) scale(1); }
      50%      { transform: translateY( 1vh) scale(1.03); }
    }

    /* Scrolling marquee rows. */
    .marquee {
      overflow: hidden; white-space: nowrap; position: relative;
      width: 100vw;
    }
    .marquee .track {
      display: inline-block; padding-left: 100vw;
      animation: scroll 18s linear infinite;
    }
    .marquee.big .track   { font-size: 22vh; line-height: 1; letter-spacing: 0.06em; }
    .marquee.small .track { font-size: 6vh;  line-height: 1; letter-spacing: 0.2em; padding-left: 100vw;
                            animation-duration: 25s; opacity: .8; }
    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* Subtle scanline overlay so it looks like a real dot-matrix. */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg,
        rgba(0,0,0,0.0) 0px, rgba(0,0,0,0.0) 2px,
        rgba(0,0,0,0.35) 3px, rgba(0,0,0,0.35) 4px);
      mix-blend-mode: multiply;
    }

    /* Tiny role badge */
    .role { position: fixed; left: 1vw; top: 1vh; font-size: 1.6vh;
            padding: 0.5vh 1vw; border: 1px solid #ff8c00; border-radius: 0.4vh;
            background: rgba(0,0,0,0.7); color: #ff8c00; }
  </style>
</head>
<body>
  <div class="role">DMD</div>
  <div class="stage">
    <div class="logo"><img src="/logo.png" alt="logo"></div>
    <div class="marquee big">
      <span class="track">★ FLIPHETIC TEST #2 ★ APP SWITCH DEMO ★ FLIPHETIC TEST #2 ★ APP SWITCH DEMO ★&nbsp;</span>
    </div>
    <div class="marquee small">
      <span class="track">PRESS PLAY · 1 COIN 1 PLAY · INSERT ANY COIN · HIGH SCORE 999.999.999 · PRESS PLAY · 1 COIN 1 PLAY · INSERT ANY COIN&nbsp;</span>
    </div>
  </div>
  <div class="scanlines"></div>
</body>
</html>
