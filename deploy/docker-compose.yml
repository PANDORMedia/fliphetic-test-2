# Two services:
#   debug  — nginx, serves all three screens (?screen=<role>) and proxies
#            /state to the bridge.
#   bridge — reads the ESP32 tester's JSON over USB serial, serves GET /state.
services:
  debug:
    image: nginx:alpine
    volumes:
      - ../site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["0:80"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 5s
      timeout: 2s
      retries: 5

  bridge:
    image: public.ecr.aws/docker/library/node:20-alpine
    working_dir: /app
    volumes:
      - ../bridge:/app:ro
    command: ["node", "server.js"]
    # The cabinet's ESP32 (CP2102 USB-UART), presented in-container as /dev/esp.
    devices:
      - "/dev/ttyUSB0:/dev/esp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8091/"]
      interval: 5s
      timeout: 2s
      retries: 5
