<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TEST #2 · Backglass</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff;
                 font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }

    .bg { position: fixed; inset: 0;
          background: #000 url('/bg.png') center/cover no-repeat;
          animation: hueShift 18s linear infinite reverse;
          filter: saturate(1.3) brightness(0.95); }
    @keyframes hueShift {
      0%   { filter: saturate(1.3) brightness(0.95) hue-rotate(0deg); }
      100% { filter: saturate(1.3) brightness(0.95) hue-rotate(360deg); }
    }

    /* Conic gradient sweep, animated. */
    .sweep {
      position: fixed; inset: -25%; mix-blend-mode: color-dodge; opacity: .35;
      background: conic-gradient(from 0deg,
        #ff0080, #ff8a00, #ffe500, #00ffae, #00d4ff, #6a00ff, #ff0080);
      animation: spin 16s linear infinite;
      filter: blur(40px);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .frame {
      position: fixed; inset: 3vh 3vw; border: 0.4vh solid rgba(255,255,255,0.25);
      border-radius: 1.5vh; box-shadow: 0 0 8vh rgba(255,140,0,0.4) inset; pointer-events: none;
    }

    .stage { position: fixed; inset: 0; display: grid; place-content: center; text-align: center; }
    .role { position: fixed; left: 3vw; top: 3vh; padding: 0.8vh 1.4vw;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.35);
            border-radius: 0.8vh; letter-spacing: 0.25em; font-size: 1.8vh; font-weight: 600; }
    h1 { font-size: 16vh; margin: 0; letter-spacing: -0.03em;
         background: linear-gradient(135deg, #fffacd, #ffd400, #ff8a00, #ff0080);
         -webkit-background-clip: text; color: transparent;
         text-shadow: 0 0 6vh rgba(255, 138, 0, 0.3);
         animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 #ff8a00); }
      50%      { transform: scale(1.04); filter: drop-shadow(0 0 4vh #ff8a00); }
    }
    .sub { font-size: 4vh; opacity: .85; letter-spacing: 0.4em; margin-top: 1vh;
           color: #fffacd; text-shadow: 0 0 1.5vh rgba(0,0,0,.7); }
    .stripe { position: fixed; left: 0; right: 0; height: 2vh;
              background: repeating-linear-gradient(90deg,
                  #ff0080 0 5%, #ff8a00 5% 10%, #ffe500 10% 15%,
                  #00ffae 15% 20%, #00d4ff 20% 25%, #6a00ff 25% 30%);
              animation: marquee 8s linear infinite; }
    .stripe.top    { top: 0;    background-size: 200% 100%; }
    .stripe.bottom { bottom: 0; background-size: 200% 100%; }
    @keyframes marquee {
      0%   { background-position:   0% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="sweep"></div>
  <div class="role">BACKGLASS</div>
  <div class="stage">
    <div>
      <h1>TEST #2</h1>
      <div class="sub">app switch demo</div>
    </div>
  </div>
  <div class="stripe top"></div>
  <div class="stripe bottom"></div>
  <div class="frame"></div>
</body>
</html>
