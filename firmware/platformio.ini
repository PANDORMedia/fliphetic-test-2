; PlatformIO project for the Fliphetic Debug Screen button/LED tester.
; Classic ESP32. The CI workflow (.github/workflows/firmware.yml) runs
; `pio run` here, merges the output, and commits firmware/build/firmware.bin
; which the cabinet flashes on load.

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
build_flags =
  ; WiFi SSID for the backglass connectivity-test block — not secret.
  ; The passphrase is deliberately NOT here: this repo is PUBLIC. CI injects
  ; WIFI_PASS from the `WIFI_PASS` Actions secret via PLATFORMIO_BUILD_FLAGS
  ; (see .github/workflows/firmware.yml). A bare local `pio run` has no
  ; passphrase and falls back to a dummy one (see src/main.cpp).
  -DWIFI_SSID='"FLIPHETIC_CAB0"'
