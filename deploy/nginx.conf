# Serves the debug screen and proxies /state to the serial bridge.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS, resolved lazily so nginx still starts if the
    # bridge container isn't up yet.
    resolver 127.0.0.11 valid=10s;

    # ESP32 button/LED state, read from the serial bridge.
    location = /state {
        set $bridge bridge;
        proxy_pass http://$bridge:8091/state;
        proxy_connect_timeout 2s;
    }

    # Live button/LED stream (Server-Sent Events) — buffering off so each
    # event reaches the screen the instant the ESP sends it.
    location = /events {
        set $bridge bridge;
        proxy_pass http://$bridge:8091/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
