[app]
id          = "fliphetic-test-2"
name        = "Fliphetic Debug Screen"
authors     = ["PANDOR Media"]
description = "Per-screen calibration & diagnostics — positioning grid, live geometry readout, cab info. Matrix-themed. One nginx service backs all three screens via the ?screen= query param."

[deploy]
strategy = "branch"
ref      = "main"

# One docker service ("debug") serves every screen; each screen gets a
# different ?screen= query param so the page can label & color itself.
[screens]
playfield = { service = "debug", port = 80, path = "/?screen=playfield" }
backglass = { service = "debug", port = 80, path = "/?screen=backglass" }
dmd       = { service = "debug", port = 80, path = "/?screen=dmd" }

[compose]
file = "deploy/docker-compose.yml"
ready_timeout = 15

# No [esp32] — a calibration screen should never reflash firmware.
