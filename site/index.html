<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fliphetic Debug Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap">
  <style>
    :root {
      --bg: #000;
      --green: #5dd86a;
      --green-bright: #b6ffb6;
      --green-dim: #1d6a2a;
      --grid-minor: rgba(93, 216, 106, 0.10);
      --grid-major: rgba(93, 216, 106, 0.32);
      --accent: #5dd86a;          /* overridden per-screen by JS */
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden;
      background: var(--bg); color: var(--green); cursor: none;
      font-family: "VT323", "Press Start 2P", monospace;
    }

    /* ---- layer 0: matrix rain (very dim, behind the grid) ---- */
    canvas#rain { position: fixed; inset: 0; z-index: 0; opacity: 0.13; }

    /* ---- layer 1: positioning grid ---- */
    #grid {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(var(--grid-minor) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-minor) 1px, transparent 1px),
        linear-gradient(var(--grid-major) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-major) 1px, transparent 1px);
      background-size:
        50px 50px, 50px 50px,      /* minor */
        200px 200px, 200px 200px;  /* major */
    }

    /* coordinate ruler labels (generated by JS) */
    .tick {
      position: fixed; z-index: 3; font-family: "VT323", monospace;
      font-size: 15px; color: var(--green); opacity: 0.8;
      text-shadow: 0 0 4px var(--green);
    }
    .tick.x { top: 2px; transform: translateX(3px); }
    .tick.y { left: 3px; transform: translateY(1px); }

    /* ---- layer 2: registration marks ---- */
    .corner {
      position: fixed; z-index: 4; width: 64px; height: 64px;
      border: 2px solid var(--green-bright);
      filter: drop-shadow(0 0 5px var(--green));
    }
    .corner.tl { top: 0; left: 0;  border-right: none; border-bottom: none; }
    .corner.tr { top: 0; right: 0; border-left: none;  border-bottom: none; }
    .corner.bl { bottom: 0; left: 0;  border-right: none; border-top: none; }
    .corner.br { bottom: 0; right: 0; border-left: none;  border-top: none; }
    .corner-label {
      position: fixed; z-index: 4; font-family: "VT323", monospace;
      font-size: 14px; color: var(--green-bright); text-shadow: 0 0 5px var(--green);
    }

    .crosshair-h, .crosshair-v {
      position: fixed; z-index: 2; background: rgba(93,216,106,0.25);
    }
    .crosshair-h { left: 0; right: 0; height: 1px; top: 50%; }
    .crosshair-v { top: 0; bottom: 0; width: 1px; left: 50%; }
    .center-dot {
      position: fixed; z-index: 4; top: 50%; left: 50%;
      width: 22px; height: 22px; margin: -11px 0 0 -11px;
      border: 2px solid var(--green-bright); border-radius: 50%;
      filter: drop-shadow(0 0 6px var(--green));
    }
    .center-label {
      position: fixed; z-index: 4; top: 50%; left: 50%;
      transform: translate(18px, 14px);
      font-family: "VT323", monospace; font-size: 15px; color: var(--green-bright);
      text-shadow: 0 0 5px var(--green); white-space: nowrap;
    }

    /* ---- layer 3: diagnostics panel ---- */
    .panel {
      position: fixed; z-index: 5; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      min-width: min(560px, 82vw);
      background: rgba(2, 8, 3, 0.86);
      border: 2px solid var(--accent);
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(93,216,106,0.25),
                  0 0 80px rgba(0,0,0,0.9) inset;
      padding: clamp(16px, 3vh, 34px) clamp(20px, 3.5vw, 44px);
    }
    .panel .role {
      font-family: "Press Start 2P", monospace;
      font-size: clamp(20px, 4.4vh, 52px);
      line-height: 1.1; letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent), 0 0 30px rgba(93,216,106,0.5);
      margin: 0 0 4px;
      word-break: break-word;
    }
    .panel .subtitle {
      font-family: "Press Start 2P", monospace;
      font-size: clamp(8px, 1.4vh, 12px); letter-spacing: 0.22em;
      color: var(--green-dim); margin-bottom: clamp(12px, 2.4vh, 22px);
    }
    table.diag { border-collapse: collapse; width: 100%; }
    table.diag td {
      padding: clamp(3px, 0.7vh, 7px) 0; vertical-align: top;
      font-size: clamp(15px, 2.5vh, 26px); line-height: 1.25;
    }
    table.diag td.k {
      color: var(--green-dim); padding-right: 22px; white-space: nowrap;
      font-size: clamp(13px, 2vh, 20px); letter-spacing: 0.08em;
    }
    table.diag td.v {
      color: var(--green-bright); text-shadow: 0 0 5px var(--green);
      width: 100%; word-break: break-word;
    }
    table.diag td.v .hl { color: #fff; }
    table.diag tr.section td {
      padding-top: clamp(8px, 1.6vh, 16px);
      color: var(--accent); font-size: clamp(11px, 1.7vh, 15px);
      letter-spacing: 0.18em; border-bottom: 1px solid rgba(93,216,106,0.18);
    }

    /* ---- layer 9: CRT scanlines ---- */
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 9;
      background: repeating-linear-gradient(0deg,
        rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.38) 3px, rgba(0,0,0,0.38) 4px);
      mix-blend-mode: multiply;
    }
    .blink { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <div id="grid"></div>
  <div id="rulers"></div>

  <div class="crosshair-h"></div>
  <div class="crosshair-v"></div>
  <div class="center-dot"></div>
  <div class="center-label" id="centerLabel">CTR</div>

  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div class="panel">
    <div class="role" id="role">SCREEN</div>
    <div class="subtitle">FLIPHETIC DEBUG SCREEN <span class="blink">_</span></div>
    <table class="diag">
      <tr class="section"><td colspan="2">// SCREEN</td></tr>
      <tr><td class="k">ROLE</td>      <td class="v" id="d-role">—</td></tr>
      <tr><td class="k">VIEWPORT</td>  <td class="v" id="d-viewport">—</td></tr>
      <tr><td class="k">DISPLAY</td>   <td class="v" id="d-screen">—</td></tr>
      <tr><td class="k">ASPECT</td>    <td class="v" id="d-aspect">—</td></tr>
      <tr><td class="k">PIXEL RATIO</td><td class="v" id="d-dpr">—</td></tr>
      <tr><td class="k">COLOR DEPTH</td><td class="v" id="d-depth">—</td></tr>

      <tr class="section"><td colspan="2">// CAB</td></tr>
      <tr><td class="k">FLIPPER IP</td><td class="v" id="d-ip">—</td></tr>
      <tr><td class="k">DASHBOARD</td> <td class="v" id="d-dash">—</td></tr>
      <tr><td class="k">KIOSK SRC</td> <td class="v" id="d-kiosk">—</td></tr>
      <tr><td class="k">NETWORK</td>   <td class="v" id="d-net">—</td></tr>

      <tr class="section"><td colspan="2">// RUNTIME</td></tr>
      <tr><td class="k">CLOCK</td>     <td class="v" id="d-clock">—</td></tr>
      <tr><td class="k">PAGE UPTIME</td><td class="v" id="d-uptime">—</td></tr>
      <tr><td class="k">BROWSER</td>   <td class="v" id="d-browser">—</td></tr>
    </table>
  </div>

  <script>
  (() => {
    "use strict";

    // ---- CONFIG -----------------------------------------------------------
    // Flipper cab Tailscale IP. Update here if the cab's tailnet address
    // ever changes (it's stable per Tailscale node, so rarely needed).
    const CAB_IP = "100.125.185.88";
    const DASHBOARD_PORT = 8080;

    // Per-role accent (all in the matrix-green family, slightly distinct so
    // you can tell screens apart at a glance).
    const ACCENTS = {
      playfield: "#5dd86a",   // matrix green
      backglass: "#5dd8c8",   // teal
      dmd:       "#b6ff5d",   // lime
    };

    const params = new URLSearchParams(location.search);
    const role = (params.get("screen") || "unknown").toLowerCase();
    const accent = ACCENTS[role] || "#5dd86a";
    document.documentElement.style.setProperty("--accent", accent);

    // ---- diagnostics ------------------------------------------------------
    const $ = (id) => document.getElementById(id);
    const loadedAt = Date.now();

    function refresh() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const sw = screen.width, sh = screen.height;
      const gcd = (a, b) => b ? gcd(b, a % b) : a;
      const g = gcd(vw, vh) || 1;

      $("role").textContent       = role.toUpperCase();
      $("d-role").innerHTML        = '<span class="hl">' + role.toUpperCase() + '</span>';
      $("d-viewport").innerHTML    = '<span class="hl">' + vw + " &times; " + vh + "</span> px";
      $("d-screen").textContent    = sw + " × " + sh + " px";
      $("d-aspect").textContent    = (vw / vh).toFixed(3) + "  (" + (vw / g) + ":" + (vh / g) + ")";
      $("d-dpr").textContent       = (window.devicePixelRatio || 1).toFixed(2);
      $("d-depth").textContent     = screen.colorDepth + "-bit";

      $("d-ip").innerHTML          = '<span class="hl">' + CAB_IP + "</span>";
      $("d-dash").textContent      = "http://" + CAB_IP + ":" + DASHBOARD_PORT;
      $("d-kiosk").textContent     = location.host + location.pathname + location.search;
      $("d-net").textContent       = navigator.onLine ? "ONLINE" : "OFFLINE";

      $("d-browser").textContent   = browserString();
      $("centerLabel").textContent = "CTR " + Math.round(vw / 2) + "," + Math.round(vh / 2);
    }

    function browserString() {
      const ua = navigator.userAgent;
      const m = ua.match(/(Chrome|Chromium)\/([\d.]+)/);
      return m ? m[1] + " " + m[2].split(".")[0] : ua.slice(0, 40);
    }

    function tick() {
      const now = new Date();
      const p = (n) => String(n).padStart(2, "0");
      $("d-clock").textContent = p(now.getHours()) + ":" + p(now.getMinutes()) + ":" + p(now.getSeconds());
      const up = Math.floor((Date.now() - loadedAt) / 1000);
      const hh = Math.floor(up / 3600), mm = Math.floor((up % 3600) / 60), ss = up % 60;
      $("d-uptime").textContent = p(hh) + ":" + p(mm) + ":" + p(ss);
    }

    // ---- coordinate ruler labels -----------------------------------------
    function buildRulers() {
      const host = $("rulers");
      host.innerHTML = "";
      const vw = window.innerWidth, vh = window.innerHeight, STEP = 200;
      const mk = (cls, text, pos) => {
        const el = document.createElement("div");
        el.className = "tick " + cls;
        el.textContent = text;
        if (cls === "x") el.style.left = pos + "px";
        else el.style.top = pos + "px";
        host.appendChild(el);
      };
      for (let x = STEP; x < vw; x += STEP) mk("x", x, x);
      for (let y = STEP; y < vh; y += STEP) mk("y", y, y);
      // edge maxima so a clipped window is obvious
      mk("x", "→" + vw, Math.max(0, vw - 52));
      mk("y", "↓" + vh, Math.max(0, vh - 20));

      // corner pixel-coordinate labels
      const corners = [
        ["0,0",            "top:6px;left:70px"],
        [vw + ",0",        "top:6px;right:70px"],
        ["0," + vh,        "bottom:6px;left:70px"],
        [vw + "," + vh,    "bottom:6px;right:70px"],
      ];
      document.querySelectorAll(".corner-label").forEach((e) => e.remove());
      corners.forEach(([txt, css]) => {
        const el = document.createElement("div");
        el.className = "corner-label";
        el.textContent = txt;
        el.style.cssText += ";" + css;
        document.body.appendChild(el);
      });
    }

    // ---- matrix rain ------------------------------------------------------
    const canvas = $("rain");
    const ctx = canvas.getContext("2d");
    let cols, drops;
    const GLYPHS = "01アウエオカサタナハマABCDEF";

    function sizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width / 16);
      drops = new Array(cols).fill(0).map(() => Math.random() * -50);
    }
    function drawRain() {
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#5dd86a";
      ctx.font = "15px monospace";
      for (let i = 0; i < cols; i++) {
        const ch = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        ctx.fillText(ch, i * 16, drops[i] * 16);
        if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    // ---- wire up ----------------------------------------------------------
    function onResize() { sizeCanvas(); buildRulers(); refresh(); }
    window.addEventListener("resize", onResize);
    sizeCanvas(); buildRulers(); refresh();
    tick();
    setInterval(tick, 1000);
    setInterval(refresh, 5000);          // keep network/geometry fresh
    setInterval(drawRain, 55);
  })();
  </script>
</body>
</html>
