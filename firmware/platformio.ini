; PlatformIO project for the Fliphetic Debug Screen button/LED tester.
; Classic ESP32. The CI workflow (.github/workflows/firmware.yml) runs
; `pio run` here, merges the output, and commits firmware/build/firmware.bin
; which the cabinet flashes on load.

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
build_flags =
  ; WiFi target for the backglass connectivity-test block.
  ; This repo is PUBLIC — do NOT commit the real passphrase. Override
  ; WIFI_PASS here (or via a CI secret) before the build you flash, or the
  ; backglass WiFi check stays red.
  -DWIFI_SSID='"FLIPHETIC_CAB0"'
  -DWIFI_PASS='"changeme"'
