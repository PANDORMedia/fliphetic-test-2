# Serves the debug screen and proxies /state to the serial bridge.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS, resolved lazily so nginx still starts if the
    # bridge container isn't up yet.
    resolver 127.0.0.11 valid=10s;

    # ESP32 button/LED state, read from the serial bridge.
    location = /state {
        set $bridge bridge;
        proxy_pass http://$bridge:8091/state;
        proxy_connect_timeout 2s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
