[app]
id          = "fliphetic-test-2"
name        = "Fliphetic Debug Screen"
authors     = ["PANDOR Media"]
description = "Per-screen calibration & diagnostics plus a cabinet button/LED tester. The playfield view shows live button state and the LED cycle, read from an ESP32 over USB serial. Matrix-themed. One nginx service backs all three screens via ?screen=; a bridge service relays the ESP serial."

[deploy]
strategy = "branch"
ref      = "main"

# One docker "debug" service serves every screen; each screen gets a
# different ?screen= query param so the page can label & color itself.
[screens]
playfield = { service = "debug", port = 80, path = "/?screen=playfield" }
backglass = { service = "debug", port = 80, path = "/?screen=backglass" }
dmd       = { service = "debug", port = 80, path = "/?screen=dmd" }

[compose]
file = "deploy/docker-compose.yml"
ready_timeout = 30

# The cabinet flashes the button/LED tester firmware to the "esp32" device on
# every load. required = false: a missing board or a failed flash only logs a
# warning, it does not abort the load. The merged binary is built and committed
# by .github/workflows/firmware.yml.
[esp32.esp32]
firmware   = "firmware/build/firmware.bin"
chip       = "esp32"
flash_addr = "0x0"
required   = false
